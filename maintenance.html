<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance | EcoKumari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="errors.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="error-body">
    <div class="error-container">
        <div class="error-content">
            <div class="error-illustration">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;">
                    <circle cx="100" cy="110" r="90" fill="#f0fdf4" />
                    <circle cx="160" cy="60" r="25" fill="#f59e0b" opacity="0.8" />
                    <path d="M20 150 Q60 120 100 150 T180 150" fill="none" stroke="#22c55e" stroke-width="4"
                        opacity="0.3" />
                    <rect x="80" y="110" width="40" height="30" fill="#6366f1" opacity="0.2" />
                    <path d="M70 110 L130 110 L100 80 Z" fill="#6366f1" opacity="0.4" />
                </svg>
            </div>
            <h1 class="error-title">We’ll Be Right Back</h1>
            <p class="error-message">We’re performing scheduled maintenance to improve your eco-tourism experience.
                Sustainability takes time!</p>

            <div class="maintenance-info">
                <p>Expected completion: <span class="completion-date">March 18, 2026 – 3:00 AM IST</span></p>
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>

                <form class="notify-form">
                    <input type="email" placeholder="Enter email to get notified" required>
                    <button type="submit" class="btn-error btn-primary">Notify Me</button>
                </form>
            </div>

            <div class="error-actions" style="margin-top: 3rem;">
                <a href="#" class="btn-error btn-outline"><i data-lucide="twitter"></i></a>
                <a href="#" class="btn-error btn-outline"><i data-lucide="linkedin"></i></a>
                <a href="#" class="btn-error btn-outline"><i data-lucide="message-square"></i></a>
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
