<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Path Not Found | EcoKumari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="errors.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="error-body">
    <div class="error-container">
        <div class="error-content">
            <div class="error-illustration">
                <!-- Using a styled SVG for the 'Lost Traveler' concept since image generation is unavailable -->
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;">
                    <circle cx="100" cy="100" r="80" fill="#eff6ff" />
                    <path d="M60 140 L140 140 L100 60 Z" fill="#6366f1" opacity="0.2" />
                    <rect x="95" y="110" width="10" height="40" fill="#94a3b8" />
                    <rect x="70" y="80" width="60" height="30" rx="4" fill="#6366f1" />
                    <path d="M130 95 L145 95 L135 85 Z" fill="#6366f1" />
                    <circle cx="100" cy="50" r="10" fill="#22c55e" opacity="0.6" />
                </svg>
            </div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-message">The eco trail you’re looking for doesn’t exist or may have been moved. Let’s get
                you back on track.</p>

            <div class="error-search">
                <i data-lucide="search"></i>
                <input type="text" placeholder="Search for eco stays, tribal products...">
            </div>

            <div class="error-actions">
                <a href="dashboard.html" class="btn-error btn-primary">
                    <i data-lucide="layout-dashboard"></i>
                    Go to Dashboard
                </a>
                <a href="index.html" class="btn-error btn-outline">
                    <i data-lucide="home"></i>
                    Go Home
                </a>
            </div>
        </div>
    </div>

    <footer class="error-footer">
        <div class="footer-links">
            <a href="help.html">Documentation</a>
            <a href="help.html">Help Center</a>
            <a href="mailto:support@ecokumari.in">Contact Support</a>
        </div>
    </footer>

    <script>lucide.createIcons();</script>
</body>

</html>
