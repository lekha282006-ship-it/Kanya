<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied | EcoKumari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="errors.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="error-body">
    <div class="error-container">
        <div class="error-content">
            <div class="error-illustration">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;">
                    <circle cx="100" cy="100" r="80" fill="#fff7ed" />
                    <rect x="60" y="100" width="80" height="60" rx="4" fill="#94a3b8" />
                    <rect x="75" y="60" width="50" height="50" rx="25" fill="none" stroke="#6366f1" stroke-width="8" />
                    <rect x="92" y="120" width="16" height="20" rx="2" fill="white" />
                </svg>
            </div>
            <h1 class="error-title">Access Denied</h1>
            <p class="error-message">You don’t have permission to view this eco zone. Please contact your workspace
                administrator for access.</p>

            <div class="error-actions">
                <a href="#" class="btn-error btn-primary">
                    <i data-lucide="key"></i>
                    Request Access
                </a>
                <a href="javascript:history.back()" class="btn-error btn-outline">
                    <i data-lucide="arrow-left"></i>
                    Go Back
                </a>
            </div>

            <p style="margin-top: 3rem; color: var(--text-muted); font-size: 0.95rem;">
                Need access? Contact your <strong style="color: var(--text-main);">Tourism Workspace
                    Administrator</strong>.
            </p>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
