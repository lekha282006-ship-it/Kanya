<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | EcoKumari</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="display: flex; align-items: center; justify-content: center; background-color: #f8fafc;">
    <div class="auth-card" style="margin: 2rem;">
        <div class="auth-header">
            <div style="font-size: 2.5rem; margin-bottom: 1rem;">🌿</div>
            <h2>Reset your password</h2>
            <p>Enter your email and we’ll send you a reset link.</p>
        </div>

        <form class="auth-form" id="forgotPasswordForm">
            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <span>Send reset link</span>
                <i data-lucide="send"></i>
            </button>

            <div class="auth-footer">
                <a href="login.html" class="forgot-link"> <i data-lucide="arrow-left"
                        style="width: 14px; height: 14px; vertical-align: middle;"></i> Back to Login</a>
            </div>
        </form>

        <div id="successMessage" style="display: none;" class="success-msg">
            If an account exists with this email, a reset link has been sent.
        </div>
    </div>

    <script src="auth.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
